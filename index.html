<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Recebimento de Carga</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0c0e10;
  --surf:#141618;
  --surf2:#1c1f22;
  --surf3:#232629;
  --bdr:#2a2e33;
  --acc:#f0b429;
  --acc2:#ffd166;
  --grn:#4ade80;
  --red:#f87171;
  --txt:#eef0f2;
  --txt2:#8a9099;
  --txt3:#4a5260;
  --mono:'IBM Plex Mono',monospace;
  --sans:'DM Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:var(--sans);overflow-x:hidden}

/* ── NAV ── */
#nav{position:fixed;top:0;left:0;right:0;height:52px;background:rgba(12,14,16,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 16px;gap:12px;z-index:100}
.nav-logo{font-family:var(--mono);font-size:10px;color:var(--acc);letter-spacing:.14em;text-transform:uppercase}
.nav-title{font-size:14px;font-weight:600;flex:1}
.nav-badge{font-family:var(--mono);font-size:9px;background:rgba(240,180,41,.12);border:1px solid rgba(240,180,41,.3);color:var(--acc);padding:2px 8px;border-radius:20px;letter-spacing:.06em}

/* ── TABS ── */
#tabs{position:fixed;top:52px;left:0;right:0;background:var(--surf);border-bottom:1px solid var(--bdr);display:flex;z-index:99;overflow-x:auto;-webkit-overflow-scrolling:touch}
#tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:10px 20px;font-size:12px;font-weight:500;color:var(--txt2);cursor:pointer;border-bottom:2px solid transparent;transition:all .18s;white-space:nowrap}
.tab.active{color:var(--acc);border-bottom-color:var(--acc)}
.tab:hover{color:var(--txt)}

/* ── PAGES ── */
#pages{margin-top:100px;padding:16px;max-width:480px;margin-left:auto;margin-right:auto}
.page{display:none}
.page.active{display:block}

/* ── FORM ── */
.section-label{font-family:var(--mono);font-size:9px;color:var(--acc);letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px;margin-top:24px;display:flex;align-items:center;gap:8px}
.section-label::after{content:'';flex:1;height:1px;background:var(--bdr)}
.section-label:first-child{margin-top:0}

.field{margin-bottom:14px}
.field label{display:block;font-size:11px;color:var(--txt2);margin-bottom:5px;font-weight:500}
.field input,.field select,.field textarea{
  width:100%;background:var(--surf2);border:1px solid var(--bdr);border-radius:8px;
  padding:12px 14px;color:var(--txt);font-family:var(--sans);font-size:14px;
  outline:none;transition:border-color .15s;-webkit-appearance:none;
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--acc)}
.field input::placeholder{color:var(--txt3)}
.field textarea{resize:none;min-height:80px;line-height:1.5}
.field select option{background:var(--surf2)}

/* hint abaixo do campo */
.hint-box{margin-top:6px;background:var(--surf3);border:1px solid var(--bdr);border-radius:6px;padding:8px 12px;display:flex;align-items:center;gap:8px}
.hint-dot{width:8px;height:8px;border-radius:50%;background:var(--acc);flex-shrink:0}
.hint-text{font-size:11px;color:var(--txt2);font-family:var(--mono)}
.hint-text span{color:var(--acc2);font-weight:600}

/* scan button */
.scan-wrap{display:flex;gap:8px}
.scan-wrap input{flex:1}
.btn-scan{flex-shrink:0;background:var(--acc);border:none;border-radius:8px;padding:0 14px;color:#0c0e10;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
.btn-scan:hover{background:var(--acc2)}
.btn-scan:active{transform:scale(.95)}

/* radio group */
.radio-group{display:flex;flex-direction:column;gap:10px}
.radio-item{display:flex;align-items:center;gap:12px;background:var(--surf2);border:1px solid var(--bdr);border-radius:8px;padding:12px 14px;cursor:pointer;transition:all .15s}
.radio-item:hover{border-color:var(--txt3)}
.radio-item.selected{border-color:var(--acc);background:rgba(240,180,41,.06)}
.radio-item input[type=radio]{display:none}
.radio-dot{width:18px;height:18px;border-radius:50%;border:2px solid var(--bdr);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.radio-item.selected .radio-dot{border-color:var(--acc);background:var(--acc)}
.radio-dot::after{content:'';width:6px;height:6px;border-radius:50%;background:#0c0e10;display:none}
.radio-item.selected .radio-dot::after{display:block}
.radio-label{font-size:14px;font-weight:500}
.radio-sub{font-size:11px;color:var(--txt2);margin-top:1px}

/* glosa obs */
#glosa-obs{display:none;margin-top:14px}
#glosa-obs.show{display:block}

/* conferentes list */
.conf-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.conf-chip{display:flex;align-items:center;gap:10px;background:var(--surf2);border:1px solid var(--bdr);border-radius:8px;padding:10px 14px}
.conf-name{flex:1;font-size:13px;font-weight:500}
.conf-del{background:none;border:none;color:var(--txt3);cursor:pointer;font-size:16px;padding:4px;border-radius:4px;transition:color .1s}
.conf-del:hover{color:var(--red)}
.conf-add{display:flex;gap:8px}
.conf-add input{flex:1}

/* buttons */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .18s;font-family:var(--sans)}
.btn-primary{background:var(--acc);color:#0c0e10}
.btn-primary:hover{background:var(--acc2)}
.btn-primary:active{transform:scale(.98)}
.btn-secondary{background:var(--surf2);color:var(--txt);border:1px solid var(--bdr);margin-top:10px}
.btn-secondary:hover{border-color:var(--txt3)}
.btn-grn{background:var(--grn);color:#0a1a0a}
.btn-grn:hover{background:#6ee79d}

/* preview */
#preview-box{background:var(--surf2);border:1px solid var(--bdr);border-radius:10px;padding:16px;font-size:12px;line-height:1.8;font-family:var(--mono);color:var(--txt2);white-space:pre-wrap;margin-bottom:14px;word-break:break-word}
#preview-box .pk{color:var(--acc);font-weight:600}
#preview-box .pv{color:var(--txt)}

/* historico */
.hist-empty{text-align:center;padding:40px 20px;color:var(--txt3);font-size:12px;font-family:var(--mono)}
.hist-item{background:var(--surf2);border:1px solid var(--bdr);border-radius:10px;padding:14px;margin-bottom:12px;cursor:pointer;transition:border-color .15s}
.hist-item:hover{border-color:var(--txt3)}
.hist-head{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.hist-date{font-family:var(--mono);font-size:10px;color:var(--txt3)}
.hist-conf{font-size:12px;font-weight:600;color:var(--acc);flex:1}
.hist-nota{font-family:var(--mono);font-size:10px;color:var(--txt2)}
.hist-prod{font-size:12px;color:var(--txt);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hist-tags{display:flex;gap=6px;flex-wrap:wrap;gap:6px}
.hist-tag{font-family:var(--mono);font-size:9px;padding:2px 8px;border-radius:10px;border:1px solid var(--bdr);color:var(--txt2)}
.hist-tag.glosa{border-color:rgba(248,113,113,.4);color:var(--red)}
.hist-tag.ok{border-color:rgba(74,222,128,.3);color:var(--grn)}

/* toast */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surf3);border:1px solid var(--bdr);border-radius:8px;padding:10px 18px;font-size:12px;color:var(--txt);font-family:var(--mono);opacity:0;transition:opacity .2s;pointer-events:none;z-index:999;white-space:nowrap}
#toast.show{opacity:1}

/* scanner overlay */
#scan-overlay{display:none;position:fixed;inset:0;background:#000;z-index:200;flex-direction:column}
#scan-overlay.open{display:flex}
#scan-video{width:100%;flex:1;object-fit:cover}
.scan-top{position:absolute;top:0;left:0;right:0;height:52px;background:rgba(0,0,0,.7);display:flex;align-items:center;padding:0 16px;gap:12px}
.scan-aim{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:200px;height:200px;border:2px solid var(--acc);border-radius:12px;box-shadow:0 0 0 9999px rgba(0,0,0,.5)}
.scan-aim::before,.scan-aim::after{content:'';position:absolute;width:20px;height:20px;border-color:var(--acc);border-style:solid}
.scan-aim::before{top:-1px;left:-1px;border-width:3px 0 0 3px;border-radius:2px 0 0 0}
.scan-aim::after{bottom:-1px;right:-1px;border-width:0 3px 3px 0;border-radius:0 0 2px 0}
.scan-hint{position:absolute;bottom:100px;left:0;right:0;text-align:center;color:rgba(255,255,255,.7);font-size:12px;font-family:var(--mono)}
.btn-scan-close{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:6px;padding:6px 12px;font-size:12px;cursor:pointer}

/* select conferente no form */
.conf-select{display:flex;flex-wrap:wrap;gap:8px}
.conf-opt{padding:8px 14px;background:var(--surf2);border:1px solid var(--bdr);border-radius:20px;font-size:12px;cursor:pointer;transition:all .15s}
.conf-opt.sel{background:rgba(240,180,41,.12);border-color:var(--acc);color:var(--acc)}

</style>
</head>
<body>

<!-- NAV -->
<div id="nav">
  <div style="display:flex;flex-direction:column;gap:1px">
    <div class="nav-logo">Gestão</div>
    <div class="nav-title">Recebimento</div>
  </div>
  <div class="nav-badge">📦 Carga</div>
</div>

<!-- TABS -->
<div id="tabs">
  <div class="tab active" onclick="showTab('form')">📋 Formulário</div>
  <div class="tab" onclick="showTab('historico')">🗂 Histórico</div>
  <div class="tab" onclick="showTab('config')">⚙ Conferentes</div>
</div>

<!-- PAGES -->
<div id="pages">

  <!-- ── FORMULÁRIO ── -->
  <div class="page active" id="page-form">

    <div class="section-label">Identificação</div>

    <div class="field">
      <label>Conferente</label>
      <div class="conf-select" id="conf-select-btns"></div>
    </div>

    <div class="field">
      <label>Número da Nota</label>
      <input type="number" id="f-nota" placeholder="Ex: 1113116" inputmode="numeric">
    </div>

    <div class="section-label">Produto</div>

    <div class="field">
      <label>Código de Barras</label>
      <div class="scan-wrap">
        <input type="text" id="f-barcode" placeholder="Digite ou escaneie" inputmode="numeric"
          oninput="buscarProduto(this.value)">
        <button class="btn-scan" onclick="abrirScanner()" title="Escanear">📷</button>
      </div>
      <div class="hint-box" id="prod-hint" style="display:none">
        <div class="hint-dot"></div>
        <div class="hint-text" id="prod-hint-txt"></div>
      </div>
    </div>

    <div class="field">
      <label>Número de Unidades na Embalagem</label>
      <input type="number" id="f-emb" placeholder="Quantidade" inputmode="numeric">
      <div class="hint-box" id="emb-hint" style="display:none">
        <div class="hint-dot" style="background:var(--txt2)"></div>
        <div class="hint-text" id="emb-hint-txt"></div>
      </div>
    </div>

    <div class="field">
      <label>Livro (Ata de Registro de Preços)</label>
      <select id="f-livro">
        <option value="">Selecione o livro...</option>
      </select>
      <div class="hint-box" id="livro-hint" style="display:none">
        <div class="hint-dot" style="background:var(--txt2)"></div>
        <div class="hint-text" id="livro-hint-txt"></div>
      </div>
    </div>

    <div class="section-label">Validade &amp; Carga</div>

    <div class="field">
      <label>Validade do Produto</label>
      <input type="date" id="f-validade">
      <div class="hint-box" id="shelf-hint" style="display:none">
        <div class="hint-dot" style="background:var(--acc)"></div>
        <div class="hint-text" id="shelf-hint-txt"></div>
      </div>
    </div>

    <div class="field">
      <label>Tipo de Carga</label>
      <div class="radio-group">
        <label class="radio-item" onclick="selectRadio('carga','paletizada',this)">
          <input type="radio" name="carga" value="paletizada">
          <div class="radio-dot"></div>
          <div><div class="radio-label">🪵 Paletizada</div><div class="radio-sub">Carga em paletes</div></div>
        </label>
        <label class="radio-item" onclick="selectRadio('carga','batida',this)">
          <input type="radio" name="carga" value="batida">
          <div class="radio-dot"></div>
          <div><div class="radio-label">📦 Batida</div><div class="radio-sub">Carga a granel / solta</div></div>
        </label>
      </div>
    </div>

    <div class="section-label">Glosa</div>

    <div class="field">
      <label>Houve Glosa?</label>
      <div class="radio-group">
        <label class="radio-item" onclick="selectRadio('glosa','nao',this);toggleGlosa(false)">
          <input type="radio" name="glosa" value="nao">
          <div class="radio-dot"></div>
          <div><div class="radio-label">✅ Não — recebimento OK</div></div>
        </label>
        <label class="radio-item" onclick="selectRadio('glosa','sim',this);toggleGlosa(true)">
          <input type="radio" name="glosa" value="sim">
          <div class="radio-dot"></div>
          <div><div class="radio-label">⚠️ Sim — informar detalhes</div></div>
        </label>
      </div>
      <div id="glosa-obs">
        <div style="margin-top:12px" class="field">
          <label>Item / Produto com glosa</label>
          <input type="text" id="f-glosa-item" placeholder="Nome do produto">
        </div>
        <div class="field">
          <label>Quantidade</label>
          <input type="number" id="f-glosa-qtd" placeholder="Qtd. com glosa" inputmode="numeric">
        </div>
        <div class="field">
          <label>Motivo da Glosa</label>
          <textarea id="f-glosa-motivo" placeholder="Descreva o motivo..."></textarea>
        </div>
      </div>
    </div>

    <div style="margin-top:8px">
      <button class="btn btn-primary" onclick="gerarMensagem()">✨ Gerar Mensagem</button>
    </div>

  </div><!-- /page-form -->

  <!-- ── PREVIEW / ENVIO ── -->
  <div class="page" id="page-preview">
    <div class="section-label">Mensagem para WhatsApp</div>
    <div id="preview-box"></div>
    <button class="btn btn-grn" onclick="copiarWhats()">📋 Copiar para WhatsApp</button>
    <button class="btn btn-secondary" onclick="compartilharWhats()">📲 Compartilhar via WhatsApp</button>
    <button class="btn btn-secondary" onclick="salvarHistorico();showTab('form');resetForm()">💾 Salvar e Novo</button>
    <button class="btn btn-secondary" style="margin-top:4px;color:var(--txt3)" onclick="showTab('form')">← Editar</button>
  </div>

  <!-- ── HISTÓRICO ── -->
  <div class="page" id="page-historico">
    <div class="section-label">Registros Salvos</div>
    <div id="hist-list"></div>
  </div>

  <!-- ── CONFIG CONFERENTES ── -->
  <div class="page" id="page-config">
    <div class="section-label">Conferentes Cadastrados</div>
    <div class="conf-list" id="conf-list"></div>
    <div class="conf-add">
      <input type="text" id="conf-new" placeholder="Nome do conferente" id="new-conf-inp">
      <button class="btn btn-primary" style="width:auto;padding:12px 18px" onclick="addConferente()">＋</button>
    </div>

    <div class="section-label" style="margin-top:32px">Conexão com Banco</div>
    <div class="field">
      <label>URL do Banco (Neon/D1)</label>
      <input type="password" id="cfg-url" placeholder="postgresql://...">
    </div>
    <button class="btn btn-primary" onclick="salvarConfig()">💾 Salvar Configurações</button>
  </div>

</div><!-- /pages -->

<!-- TOAST -->
<div id="toast"></div>

<!-- SCANNER OVERLAY -->
<div id="scan-overlay">
  <div class="scan-top">
    <button class="btn-scan-close" onclick="fecharScanner()">✕ Fechar</button>
    <span style="color:rgba(255,255,255,.6);font-size:12px;font-family:'IBM Plex Mono',monospace">Aponte para o código de barras</span>
  </div>
  <video id="scan-video" playsinline autoplay muted></video>
  <div class="scan-aim"></div>
  <div class="scan-hint">Posicione o código dentro do quadro</div>
</div>

<script>
// ── Estado ──────────────────────────────────────────────────────────────────
let radioVals = {};
let glosaAberta = false;
let produtoAtual = null;
let scanStream = null;
let barcodeDetector = null;
let scanInterval = null;
let msgAtual = '';

const PROXY = 'https://rendakigestao.akinbyiyrendaki.workers.dev/';

// ── Init ────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  renderConferentes();
  renderHistorico();
  // Restaura URL
  const url = localStorage.getItem('neon_url') || '';
  if (url) document.getElementById('cfg-url').value = url;

  // Seleciona primeiro conferente por padrão
  const confs = getConferentes();
  if (confs.length > 0) selecionarConferente(confs[0]);

  // Popula livros
  popularLivros();
});

// ── Tabs ────────────────────────────────────────────────────────────────────
function showTab(name) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    const names = ['form', 'historico', 'config'];
    t.classList.toggle('active', names[i] === name);
  });
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const page = document.getElementById('page-' + name);
  if (page) page.classList.add('active');
  if (name === 'historico') renderHistorico();
  if (name === 'config') renderConferentes();
}

// Tabs também para preview (sem item de tab)
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + name)?.classList.add('active');
  // Desmarca todas as tabs
  if (name === 'preview') {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  }
}

// ── Conferentes ─────────────────────────────────────────────────────────────
function getConferentes() {
  return JSON.parse(localStorage.getItem('conferentes') || '["Jacir","Wagner","Themyra","Francielle","Manuela","Bruno"]');
}
function saveConferentes(arr) {
  localStorage.setItem('conferentes', JSON.stringify(arr));
}
function addConferente() {
  const inp = document.getElementById('conf-new');
  const nome = inp.value.trim();
  if (!nome) return;
  const arr = getConferentes();
  if (arr.includes(nome)) { toast('Já cadastrado'); return; }
  arr.push(nome);
  saveConferentes(arr);
  inp.value = '';
  renderConferentes();
  renderConfSelect();
}
function delConferente(nome) {
  const arr = getConferentes().filter(c => c !== nome);
  saveConferentes(arr);
  renderConferentes();
  renderConfSelect();
}
function renderConferentes() {
  const list = document.getElementById('conf-list');
  const arr = getConferentes();
  list.innerHTML = arr.map(c => `
    <div class="conf-chip">
      <span class="conf-name">${c}</span>
      <button class="conf-del" onclick="delConferente('${c}')">✕</button>
    </div>`).join('');
  renderConfSelect();
}
function renderConfSelect() {
  const wrap = document.getElementById('conf-select-btns');
  const arr = getConferentes();
  const cur = wrap.querySelector('.sel')?.dataset.nome || '';
  wrap.innerHTML = arr.map(c => `
    <div class="conf-opt${c === cur ? ' sel' : ''}" data-nome="${c}" onclick="selecionarConferente('${c}')">
      ${c}
    </div>`).join('');
}
function selecionarConferente(nome) {
  document.querySelectorAll('.conf-opt').forEach(el => {
    el.classList.toggle('sel', el.dataset.nome === nome);
  });
}
function getConferenteSel() {
  return document.querySelector('.conf-opt.sel')?.dataset.nome || '';
}

// ── Config ──────────────────────────────────────────────────────────────────
function salvarConfig() {
  const url = document.getElementById('cfg-url').value.trim();
  localStorage.setItem('neon_url', url);
  toast('✅ Configurações salvas');
}

// ── Radio ───────────────────────────────────────────────────────────────────
function selectRadio(group, val, el) {
  radioVals[group] = val;
  el.closest('.radio-group')?.querySelectorAll('.radio-item').forEach(item => {
    item.classList.remove('selected');
  });
  el.classList.add('selected');
}
function toggleGlosa(show) {
  glosaAberta = show;
  document.getElementById('glosa-obs').classList.toggle('show', show);
}

// ── Livros ──────────────────────────────────────────────────────────────────
function popularLivros() {
  const sel = document.getElementById('f-livro');
  const livros = ['i', 'ii', 'iii', 'iv', 'v', 'vi', 'vii', 'viii', 'ix', 'x'];
  livros.forEach(l => {
    const opt = document.createElement('option');
    opt.value = l;
    opt.textContent = `Livro ${l.toUpperCase()}`;
    sel.appendChild(opt);
  });
}

// ── Buscar produto no banco ─────────────────────────────────────────────────
let buscaTimer = null;
function buscarProduto(codigo) {
  clearTimeout(buscaTimer);
  if (codigo.length < 4) {
    esconderHints();
    return;
  }
  buscaTimer = setTimeout(async () => {
    const url = localStorage.getItem('neon_url');
    if (!url) return;
    try {
      const rows = await qNeon(`SELECT "Produto" as produto, "Emb." as emb, "Shelf" as shelf FROM snapshot_posicao WHERE "Cod.Barras" = '${codigo}' LIMIT 1`);
      if (rows && rows[0]) {
        produtoAtual = rows[0];
        mostrarHintProduto(rows[0]);
      } else {
        esconderHints();
      }
    } catch(e) {
      // sem conexão, só mostra que digitou
    }
  }, 600);
}
function mostrarHintProduto(r) {
  const ph = document.getElementById('prod-hint');
  const pt = document.getElementById('prod-hint-txt');
  ph.style.display = 'flex';
  pt.innerHTML = `📦 <span>${r.produto || '—'}</span>`;

  if (r.emb) {
    document.getElementById('emb-hint').style.display = 'flex';
    document.getElementById('emb-hint-txt').innerHTML = `Embalagem cadastrada: <span>${r.emb}</span>`;
    document.getElementById('f-emb').placeholder = r.emb;
  }
  if (r.shelf) {
    document.getElementById('shelf-hint').style.display = 'flex';
    document.getElementById('shelf-hint-txt').innerHTML = `Shelf life do item: <span>${r.shelf} dias</span>`;
  }
}
function esconderHints() {
  produtoAtual = null;
  ['prod-hint','emb-hint','shelf-hint','livro-hint'].forEach(id => {
    document.getElementById(id).style.display = 'none';
  });
}

// ── Scanner ─────────────────────────────────────────────────────────────────
async function abrirScanner() {
  const overlay = document.getElementById('scan-overlay');
  overlay.classList.add('open');
  try {
    scanStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    const video = document.getElementById('scan-video');
    video.srcObject = scanStream;
    await video.play();

    // Tenta BarcodeDetector nativo
    if ('BarcodeDetector' in window) {
      barcodeDetector = new BarcodeDetector({ formats: ['ean_13', 'ean_8', 'code_128', 'code_39', 'upc_a', 'upc_e'] });
      scanInterval = setInterval(async () => {
        try {
          const barcodes = await barcodeDetector.detect(video);
          if (barcodes.length > 0) {
            const code = barcodes[0].rawValue;
            fecharScanner();
            document.getElementById('f-barcode').value = code;
            buscarProduto(code);
            toast('📷 Código lido: ' + code);
          }
        } catch(e) {}
      }, 400);
    } else {
      // Fallback: input manual após 1s
      setTimeout(() => {
        const code = prompt('BarcodeDetector não disponível.\nDigite o código manualmente:');
        if (code) {
          fecharScanner();
          document.getElementById('f-barcode').value = code.trim();
          buscarProduto(code.trim());
        }
      }, 500);
    }
  } catch(e) {
    toast('⚠ Câmera não disponível');
    overlay.classList.remove('open');
  }
}
function fecharScanner() {
  clearInterval(scanInterval);
  if (scanStream) { scanStream.getTracks().forEach(t => t.stop()); scanStream = null; }
  document.getElementById('scan-overlay').classList.remove('open');
}

// ── Gerar mensagem ──────────────────────────────────────────────────────────
function gerarMensagem() {
  const conferente = getConferenteSel();
  const nota = document.getElementById('f-nota').value.trim();
  const barcode = document.getElementById('f-barcode').value.trim();
  const emb = document.getElementById('f-emb').value.trim();
  const livro = document.getElementById('f-livro').value;
  const validade = document.getElementById('f-validade').value;
  const carga = radioVals['carga'] || '';
  const glosa = radioVals['glosa'] || '';

  if (!conferente) { toast('⚠ Selecione o conferente'); return; }
  if (!nota) { toast('⚠ Informe o número da nota'); return; }
  if (!barcode) { toast('⚠ Informe o código de barras'); return; }
  if (!carga) { toast('⚠ Selecione o tipo de carga'); return; }
  if (!glosa) { toast('⚠ Informe se houve glosa'); return; }

  const nomeProd = produtoAtual?.produto || barcode;
  const embFinal = emb || produtoAtual?.emb || '—';
  const livroFinal = livro ? `Livro ${livro.toUpperCase()}` : '—';
  const valFmt = validade ? new Date(validade + 'T12:00:00').toLocaleDateString('pt-BR') : '—';
  const cargaFmt = carga === 'paletizada' ? '🪵 Paletizada' : '📦 Batida';

  let glosaFmt = '✅ Não';
  if (glosa === 'sim') {
    const item = document.getElementById('f-glosa-item').value.trim();
    const qtd = document.getElementById('f-glosa-qtd').value.trim();
    const motivo = document.getElementById('f-glosa-motivo').value.trim();
    glosaFmt = `⚠️ Sim\nItem: ${item || '—'}\nQtd.: ${qtd || '—'}\nMotivo: ${motivo || '—'}`;
  }

  const agora = new Date().toLocaleString('pt-BR');

  msgAtual = `📦 *RECEBIMENTO DE CARGA*
━━━━━━━━━━━━━━━━━━━━━
👤 Conferente: ${conferente}
🗒️ Nº da Nota: ${nota}
━━━━━━━━━━━━━━━━━━━━━
📋 Produto: ${nomeProd}
🔢 Cód. Barras: ${barcode}
📦 Embalagem: ${embFinal} un.
📖 ${livroFinal}
📅 Validade: ${valFmt}
🚚 Carga: ${cargaFmt}
━━━━━━━━━━━━━━━━━━━━━
⚠️ Glosa: ${glosaFmt}
━━━━━━━━━━━━━━━━━━━━━
🕐 ${agora}`;

  // Renderiza preview
  const box = document.getElementById('preview-box');
  box.innerHTML = msgAtual
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/\*(.+?)\*/g, '<span class="pk">$1</span>')
    .replace(/━+/g, '<span style="color:var(--bdr)">━━━━━━━━━━━━━━━━━━━━━</span>');

  showPage('preview');
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
}

// ── Copiar / Compartilhar ───────────────────────────────────────────────────
async function copiarWhats() {
  try {
    await navigator.clipboard.writeText(msgAtual);
    toast('✅ Copiado! Cole no WhatsApp');
  } catch(e) {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = msgAtual;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    toast('✅ Copiado!');
  }
}
function compartilharWhats() {
  const encoded = encodeURIComponent(msgAtual);
  window.open(`https://wa.me/?text=${encoded}`, '_blank');
}

// ── Salvar histórico ────────────────────────────────────────────────────────
function salvarHistorico() {
  const conferente = getConferenteSel();
  const nota = document.getElementById('f-nota').value.trim();
  const barcode = document.getElementById('f-barcode').value.trim();
  const glosa = radioVals['glosa'] || 'nao';
  const agora = new Date().toISOString();
  const nomeProd = produtoAtual?.produto || barcode;

  const hist = JSON.parse(localStorage.getItem('recebimento_hist') || '[]');
  hist.unshift({ id: Date.now(), data: agora, conferente, nota, barcode, produto: nomeProd, glosa, msg: msgAtual });
  if (hist.length > 200) hist.pop();
  localStorage.setItem('recebimento_hist', JSON.stringify(hist));
  toast('💾 Registro salvo');
}
function renderHistorico() {
  const list = document.getElementById('hist-list');
  const hist = JSON.parse(localStorage.getItem('recebimento_hist') || '[]');
  if (!hist.length) {
    list.innerHTML = '<div class="hist-empty">📭<br>Nenhum registro ainda</div>';
    return;
  }
  list.innerHTML = hist.map(h => {
    const d = new Date(h.data).toLocaleString('pt-BR');
    const tagGlosa = h.glosa === 'sim'
      ? '<div class="hist-tag glosa">⚠ Glosa</div>'
      : '<div class="hist-tag ok">✅ OK</div>';
    return `<div class="hist-item" onclick="verRegistro('${h.id}')">
      <div class="hist-head">
        <div class="hist-conf">${h.conferente || '—'}</div>
        <div class="hist-nota">Nota: ${h.nota || '—'}</div>
      </div>
      <div class="hist-prod">${h.produto || h.barcode || '—'}</div>
      <div class="hist-tags">${tagGlosa}<div class="hist-tag">${d}</div></div>
    </div>`;
  }).join('');
}
function verRegistro(id) {
  const hist = JSON.parse(localStorage.getItem('recebimento_hist') || '[]');
  const h = hist.find(x => x.id == id);
  if (!h) return;
  msgAtual = h.msg;
  const box = document.getElementById('preview-box');
  box.innerHTML = (h.msg || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/\*(.+?)\*/g, '<span class="pk">$1</span>')
    .replace(/━+/g, '<span style="color:var(--bdr)">━━━━━━━━━━━━━━━━━━━━━</span>');
  showPage('preview');
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
}

// ── Reset form ──────────────────────────────────────────────────────────────
function resetForm() {
  document.getElementById('f-nota').value = '';
  document.getElementById('f-barcode').value = '';
  document.getElementById('f-emb').value = '';
  document.getElementById('f-livro').value = '';
  document.getElementById('f-validade').value = '';
  document.getElementById('f-glosa-item').value = '';
  document.getElementById('f-glosa-qtd').value = '';
  document.getElementById('f-glosa-motivo').value = '';
  radioVals = {};
  glosaAberta = false;
  produtoAtual = null;
  document.querySelectorAll('.radio-item').forEach(r => r.classList.remove('selected'));
  document.getElementById('glosa-obs').classList.remove('show');
  esconderHints();
}

// ── Neon query ──────────────────────────────────────────────────────────────
async function qNeon(sql) {
  const url = localStorage.getItem('neon_url');
  if (!url) return [];
  const r = await fetch(PROXY, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ query: sql, params: [], connectionString: url })
  });
  if (!r.ok) throw new Error(`${r.status}`);
  const d = await r.json();
  return d.rows || [];
}

// ── Toast ───────────────────────────────────────────────────────────────────
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}
</script>
